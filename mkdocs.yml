site_name: Computus Cloud Beta Docs
site_url: https://docs.computus.io/
site_description: Official documentation for the Computus Cloud Beta — OpenStack-based cloud with S3-compatible object storage (limited to beta testers)
site_author: Computus

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - scheme: default
      primary: blue grey
      accent: blue
    - scheme: slate
      primary: blue grey
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/solid/globe
      link: https://beta.computus.io
      name: Beta Portal
    - icon: fontawesome/solid/database
      link: https://s3.computus.io:8080
      name: S3 API (Beta)

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md

  - Getting Started:
      - What is Computus Cloud?: getting-started/what-is-computus-cloud.md
      - Platform Overview: getting-started/platform-overview.md
      - Beta Limitations: getting-started/beta-limitations.md
      - Account Signup: getting-started/account-signup.md
      - First Login: getting-started/first-login.md

  - Control Panel:
      - Accessing the Portal: control-panel/accessing-the-portal.md
      - Dashboard Overview: control-panel/dashboard-overview.md
      - Projects and Tenants: control-panel/projects-and-tenants.md
      - Billing Overview: control-panel/billing-overview.md
      - API Keys: control-panel/api-keys.md

  - Object Storage (S3):
      - Overview: object-storage/object-storage-overview.md
      - S3 Endpoint: object-storage/s3-endpoint.md
      - Access Keys: object-storage/access-keys-and-secret-keys.md
      - Creating Buckets: object-storage/creating-buckets.md
      - Using AWS CLI: object-storage/using-aws-cli.md
      - Using S3 Browser: object-storage/using-s3-browser-and-cyberduck.md
      - Bucket Policies: object-storage/bucket-policies.md
      - Troubleshooting: object-storage/troubleshooting-s3-access.md

  - Compute:
      - Instances Overview: compute/instances-overview.md
      - Creating a VM: compute/creating-a-vm.md
      - Flavors: compute/flavors.md
      - Images: compute/images.md
      - SSH Keys: compute/ssh-keys.md
      - IPv6 Access: compute/floating-ips.md
      - Reboot / Resize: compute/reboot-stop-resize.md

  - Networking:
      - Overview: networking/networks-overview.md
      - Private Networks: networking/private-networks.md
