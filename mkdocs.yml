site_name: Computus Cloud Docs
site_url: https://docs.computus.io/
site_description: Documentation for the Computus Cloud platform powered by OpenStack, OSIE, and S3-compatible object storage.
site_author: Computus

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - scheme: default
      primary: blue grey
      accent: blue
    - scheme: slate
      primary: blue grey
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/solid/globe
      link: https://cloud.computus.io
      name: Cloud Portal
    - icon: fontawesome/solid/database
      link: https://s3.computus.io
      name: S3 API

extra_css:
  - stylesheets/extra.css

