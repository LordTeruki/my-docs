      - VM Build Failed: troubleshooting/vm-build-failed.md
      - S3 Signature Error: troubleshooting/s3-signaturedoesnotmatch.md
      - Bucket Access Denied: troubleshooting/bucket-access-denied.md

  - Reference:
      - Endpoint Reference: reference/endpoint-reference.md
      - FAQ: reference/faq.md
      - Glossary: reference/glossary.md
      - Support: reference/support-contact.md

  - Platform Architecture:
